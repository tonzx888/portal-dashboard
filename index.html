<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="sidebar">
        <h2>Dashboard</h2>
        <ul id="sidebarMenu"></ul>
    </div>

    <div class="content">

        <div class="topbar">
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>

        <h1>Selamat Datang</h1>

        <div class="dashboard-grid">

            <div class="card">
                <h3>Total Staff</h3>
                <p id="totalStaff">Memuat...</p>
            </div>

            <div class="card">
                <h3>Staff Cuti</h3>
                <p id="staffCuti">Memuat...</p>
            </div>

            <div class="card">
                <h3>Offday Hari Ini</h3>
                <p id="offdayHariIni">Memuat...</p>
            </div>

            <div class="card">
                <h3>Passport Warning</h3>
                <p id="passportWarning">Memuat...</p>
            </div>

            <div class="card">
                <h3>Visa Warning</h3>
                <p id="visaWarning">Memuat...</p>
            </div>

        </div>

    </div>

</div>

<script src="auth.js"></script>
<script src="menu.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
