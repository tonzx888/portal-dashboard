<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Dashboard HR</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body class="login-body">

    <main class="login-shell">
        <section class="login-card">

            <div class="login-brand">
                <div class="login-logo">UP</div>

                <div>
                    <p class="login-eyebrow">INTERNAL SYSTEM</p>
                    <h1>UP Dashboard</h1>
                    <p class="login-subtitle">
                        Masuk untuk mengakses data staff, cuti, offday, dan monitoring dokumen.
                    </p>
                </div>
            </div>

            <form id="loginForm" class="login-form">

                <div class="login-field">
                    <label for="username">Username</label>

                    <div class="login-input-wrap">
                        <span class="login-input-icon">👤</span>

                        <input
                            type="text"
                            id="username"
                            placeholder="Masukkan username"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <div class="login-field">
                    <label for="password">Password</label>

                    <div class="login-input-wrap">
                        <span class="login-input-icon">🔒</span>

                        <input
                            type="password"
                            id="password"
                            placeholder="Masukkan password"
                            autocomplete="current-password"
                            required
                        >

                        <button
                            type="button"
                            id="togglePassword"
                            class="login-toggle-password"
                            aria-label="Tampilkan password"
                        >
                            👁
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-submit">
                    <span>Masuk Dashboard</span>
                    <span class="login-submit-arrow">→</span>
                </button>

                <p id="pesanLogin" class="login-message"></p>
            </form>

            <div class="login-footer">
                <span class="login-status-dot"></span>
                <span>Secure HR Access</span>
            </div>

        </section>
    </main>

    <script src="login.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const toggleButton = document.getElementById("togglePassword");
            const passwordInput = document.getElementById("password");

            toggleButton?.addEventListener("click", () => {
                const isPassword = passwordInput.type === "password";

                passwordInput.type = isPassword ? "text" : "password";
                toggleButton.textContent = isPassword ? "🙈" : "👁";
                toggleButton.setAttribute(
                    "aria-label",
                    isPassword ? "Sembunyikan password" : "Tampilkan password"
                );
            });
        });
    </script>

</body>
</html>
